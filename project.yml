name: OSINTIndex
options:
  bundleIdPrefix: fr.vincentlauriat
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

# Schemes explicites (sinon xcodegen n'en génère pas → schemes perdus à chaque régénération).
schemes:
  OSINTIndex:
    build:
      targets:
        OSINTIndex: all
        OSINTIndexTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OSINTIndexTests
  OSINTIndexiOS:
    build:
      targets:
        OSINTIndexiOS: all
    run:
      config: Debug

targets:
  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  OSINTIndex:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OSINTIndex
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
          - "Info-iOS.plist"
      - path: data/osint-tools.json
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: OSINT-index
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.osintindex
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: OSINTIndex/OSINTIndex.entitlements
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: OSINTIndex/Info.plist
      properties:
        CFBundleName: OSINT-index
        CFBundleDisplayName: OSINT-index
        CFBundleIdentifier: fr.vincentlauriat.osintindex
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        SUFeedURL: https://raw.githubusercontent.com/vincentlauriat/OSINT-index/main/appcast.xml
        SUPublicEDKey: kpUr3fknP2WreS4ilM3wxKrSCa5wzpayDoahd2k/jb4=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400

  # ---------------------------------------------------------------------------
  # Tests unitaires (macOS uniquement — les Models/Services testés sont partagés
  # avec iOS mais Foundation-only, pas besoin de dupliquer les tests par plateforme).
  # ---------------------------------------------------------------------------
  # Non-hosted (standalone) unit test bundle: compiles the pure Foundation Models/Services
  # directly rather than depending on the OSINTIndex app target, to avoid TEST_HOST wiring
  # (which breaks because PRODUCT_NAME "OSINT-index" != target name "OSINTIndex").
  OSINTIndexTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OSINTIndexTests
      - path: OSINTIndex/Models/Catalog.swift
      - path: OSINTIndex/Models/ToolCategory.swift
      - path: OSINTIndex/Models/OsintTool.swift
      - path: OSINTIndex/Services/FavoritesStore.swift
      - path: data/osint-tools.json
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO

  # ---------------------------------------------------------------------------
  # iOS / iPadOS — codebase partagé avec la cible macOS
  # ---------------------------------------------------------------------------
  OSINTIndexiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OSINTIndex
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
          - "Info-iOS.plist"
      - path: data/osint-tools.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: OSINT-index
        PRODUCT_BUNDLE_IDENTIFIER: fr.vincentlauriat.osintindex
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # Signature automatique gérée dans Xcode (ton Apple ID).
        # Le build de vérification simulateur passe CODE_SIGNING_ALLOWED=NO en argument.
        CODE_SIGN_STYLE: Automatic
    info:
      path: OSINTIndex/Info-iOS.plist
      properties:
        CFBundleName: OSINT-index
        CFBundleDisplayName: OSINT-index
        CFBundleIdentifier: fr.vincentlauriat.osintindex
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
